name: Build CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    strategy:
      matrix:
        arch: [x86, x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: "true"
      - name: install packages
        run: |
          sudo apt update
          sudo apt-get install cmake
          if [ "${{ matrix.arch }}" = "x86" ]; then
            sudo apt-get install -y g++-multilib
          fi
      - name: cmake
        run: |
          mkdir build && cd build
          if [ "${{ matrix.arch }}" = "x64" ]; then
            cmake -DCMAKE_BUILD_TYPE=Release -DPLUGIN_ARCH=x64 ..
          else
            cmake -DCMAKE_BUILD_TYPE=Release ..
          fi
      - name: make
        run: cd build && make -j4
      - name: cpack
        run: cd build && cpack
      - name: create releases directory
        run: mkdir releases
      - name: move release package
        run: cd build && mv cpack/*.tar.gz ../releases/samp-node-linux-${{ matrix.arch }}.tar.gz
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: releases/samp-node-linux-${{ matrix.arch }}.tar.gz
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: samp-node-linux-${{ matrix.arch }}
          path: releases/samp-node-linux-${{ matrix.arch }}.tar.gz
          archive: false

  windows:
    strategy:
      matrix:
        arch: [x86, x64]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: "true"
      - name: cmake
        shell: powershell
        run: |
          mkdir build
          cd build
          if ("${{ matrix.arch }}" -eq "x64") {
            cmake .. -A x64 -DPLUGIN_ARCH=x64
          } else {
            cmake .. -A Win32
          }
      - name: build
        run: cd build && cmake --build . --config Release
      - name: cpack
        shell: powershell
        run: |
          $env:PATH="C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\;$env:PATH"
          cd build
          cpack
      - name: create releases directory
        run: mkdir releases
      - name: move release package
        run: cd build && mv cpack/*.zip ../releases/samp-node-windows-${{ matrix.arch }}.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: releases/samp-node-windows-${{ matrix.arch }}.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: samp-node-windows-${{ matrix.arch }}
          path: releases/samp-node-windows-${{ matrix.arch }}.zip
          archive: false
